services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      # Montage des données utiles pour permettre la ré-indexation sans rebuild
      - ./database:/app/database
      - ./base_vectorielle:/app/base_vectorielle
      - ./database:/app/database

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "8078:8078" # J'utilise le port que vous aviez tenté de configurer (8078)
    depends_on:
      - backend